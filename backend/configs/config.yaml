app:
  name: "Email Campaign System"
  version: "1.0.0"
  environment: "development"
  debug: true
  timezone: "UTC"
  locale: "en"

server:
  host: "0.0.0.0"
  port: 8080
  mode: "debug"
  read_timeout: 30s
  write_timeout: 30s
  idle_timeout: 120s
  shutdown_timeout: 30s
  max_header_bytes: 1048576
  enable_cors: true
  allowed_origins:
    - "*"
  enable_websocket: true

database:
  driver: "postgres"
  host: "localhost"
  port: 5432
  username: "rahman"
  password: ""
  database: "campaign_system"
  ssl_mode: "disable"
  max_open_conns: 25
  max_idle_conns: 5
  conn_max_lifetime: 5m
  auto_migrate: true
cache:
  type: "redis"
  host: "localhost"
  port: 6379
  password: ""
  database: 0
  max_retries: 3
  pool_size: 10
  min_idle_conns: 2
  default_expiration: 1h
  cleanup_interval: 10m

logging:
  level: "debug"
  format: "json"
  output_paths:
    - "stdout"
    - "./storage/logs/app.log"
  error_output_paths:
    - "stdout"  # ← errors to terminal too
    - "./storage/logs/error.log"
  enable_debug_log: true
  enable_failed_log: true
security:
  enable_auth: false
  api_key: "2d5a5061-07df-4ca6-96df-cc0160261ce6"
  enable_api_key: false
  encryption_key: "Te0vKvqalDWdfIZCn5M5SMPlfGopiJ87Lnzzux9oJbs="
  enable_encryption: true