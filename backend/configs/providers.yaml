providers:
  gmail:
    type: oauth2
    name: Gmail
    enabled: true
    priority: 1
    api_endpoint: https://gmail.googleapis.com/gmail/v1
    oauth:
      auth_url: https://accounts.google.com/o/oauth2/v2/auth
      token_url: https://oauth2.googleapis.com/token
      scopes:
        - https://www.googleapis.com/auth/gmail.send
        - https://www.googleapis.com/auth/gmail.compose
      client_id: ""
      client_secret: ""
      redirect_uri: http://localhost:8080/auth/callback
    limits:
      daily_limit: 500
      per_minute: 10
      per_hour: 100
      burst: 5
    retry:
      max_attempts: 3
      base_delay: 5s
      max_delay: 60s
      exponential_backoff: true
    timeout:
      connection: 30s
      read: 30s
      write: 30s
    features:
      support_html: true
      support_attachments: true
      max_attachment_size: 25000000
      max_recipients: 500
      support_tracking: true
      support_scheduling: false

  workspace:
    type: smtp
    name: Google Workspace
    enabled: true
    priority: 2
    smtp:
      host: smtp.gmail.com
      port: 587
      encryption: starttls
      auth_method: plain
      require_auth: true
    limits:
      daily_limit: 2000
      per_minute: 30
      per_hour: 500
      burst: 10
    retry:
      max_attempts: 3
      base_delay: 5s
      max_delay: 60s
      exponential_backoff: true
    timeout:
      connection: 30s
      read: 30s
      write: 30s
      idle: 300s
    connection_pool:
      enabled: true
      max_idle: 10
      max_open: 20
      max_lifetime: 3600s
    features:
      support_html: true
      support_attachments: true
      max_attachment_size: 25000000
