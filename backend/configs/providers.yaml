health_check:
  enabled: true
  interval: 600s
  timeout: 10s
  check_smtp_connection: true
  check_auth: true
  failure_threshold: 3
  success_threshold: 2

connection_settings:
  keep_alive: true
  tcp_keep_alive: 60s
  tls_min_version: 1.2
  tls_handshake_timeout: 10s
  verify_ssl: true
  skip_cert_verification: false
  enable_compression: false

error_handling:
  permanent_errors:
    - 550
    - 551
    - 552
    - 553
    - 554
  temporary_errors:
    - 421
    - 450
    - 451
    - 452
  retry_on_timeout: true
  retry_on_connection_refused: true
  max_consecutive_failures: 5

rate_limiting:
  strategy: token_bucket
  adaptive: true
  backoff_on_error: true
  backoff_multiplier: 2
  max_backoff: 300s
  recovery_time: 600s

monitoring:
  track_send_rate: true
  track_error_rate: true
  track_latency: true
  track_success_rate: true
  metrics_interval: 60s

security:
  store_credentials_encrypted: true
  rotate_tokens: true
  token_refresh_before_expiry: 300s
  validate_recipient_domain: false
  block_disposable_emails: false
